const LS_KEY = "marcus_portfolio_data_v2";

// ─── LocalStorage helpers ───────────────────────────────────────────────────

function lsLoad() {
  try {
    localStorage.removeItem("marcus_portfolio_data_v1");
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return null;
    const p = JSON.parse(raw);
    return { ...DEFAULT_DATA, ...p, ui: { ...DEFAULT_DATA.ui, ...(p.ui || {}) } };
  } catch { return null; }
}

function lsSave(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch {}
}

// ─── Supabase helpers ────────────────────────────────────────────────────────

async function sbLoad() {
  if (!window.supabase || !window.SUPABASE_CONFIGURED) return null;
  try {
    const sb = window.supabase;
    const headers = {
      "Content-Type": "application/json",
      "apikey": sb._key,
    };
    if (sb._token) headers["Authorization"] = `Bearer ${sb._token}`;

    const [profileRes, projectsRes, skillsRes, expRes, testRes] = await Promise.all([
      fetch(`${sb._url}/rest/v1/portfolio_profile?select=*&limit=1`, { headers }),
      fetch(`${sb._url}/rest/v1/portfolio_projects?select=*&order=sort_order`, { headers }),
      fetch(`${sb._url}/rest/v1/portfolio_skills?select=*&order=sort_order`, { headers }),
      fetch(`${sb._url}/rest/v1/portfolio_experience?select=*&order=sort_order`, { headers }),
      fetch(`${sb._url}/rest/v1/portfolio_testimonials?select=*&order=sort_order`, { headers }),
    ]);

    if (!profileRes.ok) return null;

    const [profiles, projects, skills, experience, testimonials] = await Promise.all([
      profileRes.json(), projectsRes.json(), skillsRes.json(), expRes.json(), testRes.json(),
    ]);

    const profile = profiles[0];
    if (!profile) return null;

    return {
      ...DEFAULT_DATA,
      name: profile.name || DEFAULT_DATA.name,
      headline: profile.headline || DEFAULT_DATA.headline,
      tagline: profile.tagline || DEFAULT_DATA.tagline,
      about: profile.about || DEFAULT_DATA.about,
      location: profile.location || DEFAULT_DATA.location,
      email: profile.email || DEFAULT_DATA.email,
      github: profile.github || DEFAULT_DATA.github,
      linkedin: profile.linkedin || DEFAULT_DATA.linkedin,
      photo: profile.photo || null,
      cvUrl: profile.cv_url || null,
      formspreeId: profile.formspree_id || "",
      ui: { ...DEFAULT_DATA.ui, ...(profile.ui || {}) },
      projects: projects.length > 0 ? projects.map(p => ({
        id: p.id, title: p.title, tags: p.tags || [], description: p.description,
        year: p.year, image: p.image_url || null, github: p.github_url || "", link: p.project_link || "",
      })) : DEFAULT_DATA.projects,
      skills: skills.length > 0 ? skills.map(s => ({ name: s.name, category: s.category })) : DEFAULT_DATA.skills,
      experience: experience.length > 0 ? experience.map(x => ({ role: x.role, company: x.company, period: x.period, description: x.description })) : DEFAULT_DATA.experience,
      testimonials: testimonials.map(t => ({ quote: t.quote, author: t.author, role: t.role })),
    };
  } catch (e) {
    console.warn("Supabase load failed, using local data", e);
    return null;
  }
}

async function sbSave(data) {
  if (!window.supabase || !window.SUPABASE_CONFIGURED || !window.supabase._token) return false;
  try {
    const sb = window.supabase;
    const headers = {
      "Content-Type": "application/json",
      "apikey": sb._key,
      "Authorization": `Bearer ${sb._token}`,
      "Prefer": "resolution=merge-duplicates,return=minimal",
    };

    // 1. Upsert profile (fixed id "main")
    await fetch(`${sb._url}/rest/v1/portfolio_profile`, {
      method: "POST", headers,
      body: JSON.stringify([{
        id: "00000000-0000-0000-0000-000000000001",
        name: data.name, headline: data.headline, tagline: data.tagline,
        about: data.about, location: data.location, email: data.email,
        github: data.github, linkedin: data.linkedin,
        photo: data.photo || null,
        cv_url: data.cvUrl || null,
        formspree_id: data.formspreeId || "",
        ui: data.ui || {},
        updated_at: new Date().toISOString(),
      }]),
    });

    // 2. Replace projects: delete all then insert
    await fetch(`${sb._url}/rest/v1/portfolio_projects?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: "DELETE", headers,
    });
    if (data.projects.length > 0) {
      await fetch(`${sb._url}/rest/v1/portfolio_projects`, {
        method: "POST",
        headers: { ...headers, Prefer: "return=minimal" },
        body: JSON.stringify(data.projects.map((p, i) => ({
          title: p.title, description: p.description, tags: p.tags || [],
          year: p.year, image_url: p.image || null,
          github_url: p.github || "", project_link: p.link || "",
          sort_order: i,
        }))),
      });
    }

    // 3. Replace skills
    await fetch(`${sb._url}/rest/v1/portfolio_skills?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: "DELETE", headers,
    });
    if (data.skills.length > 0) {
      await fetch(`${sb._url}/rest/v1/portfolio_skills`, {
        method: "POST",
        headers: { ...headers, Prefer: "return=minimal" },
        body: JSON.stringify(data.skills.map((s, i) => ({ name: s.name, category: s.category, sort_order: i }))),
      });
    }

    // 4. Replace experience
    await fetch(`${sb._url}/rest/v1/portfolio_experience?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: "DELETE", headers,
    });
    if (data.experience.length > 0) {
      await fetch(`${sb._url}/rest/v1/portfolio_experience`, {
        method: "POST",
        headers: { ...headers, Prefer: "return=minimal" },
        body: JSON.stringify(data.experience.map((x, i) => ({ role: x.role, company: x.company, period: x.period, description: x.description, sort_order: i }))),
      });
    }

    // 5. Replace testimonials
    await fetch(`${sb._url}/rest/v1/portfolio_testimonials?id=neq.00000000-0000-0000-0000-000000000000`, {
      method: "DELETE", headers,
    });
    if (data.testimonials.length > 0) {
      await fetch(`${sb._url}/rest/v1/portfolio_testimonials`, {
        method: "POST",
        headers: { ...headers, Prefer: "return=minimal" },
        body: JSON.stringify(data.testimonials.map((t, i) => ({ quote: t.quote, author: t.author, role: t.role, sort_order: i }))),
      });
    }

    return true;
  } catch (e) {
    console.error("Supabase save failed", e);
    return false;
  }
}

// ─── Upload de imagem para Supabase Storage ─────────────────────────────────

async function uploadImageToSupabase(file) {
  if (!window.supabase || !window.SUPABASE_CONFIGURED || !window.supabase._token) return null;
  const sb = window.supabase;
  const path = `projects/${Date.now()}-${file.name.replace(/[^a-z0-9.]/gi, "_")}`;
  const r = await fetch(`${sb._url}/storage/v1/object/project-images/${path}`, {
    method: "POST",
    headers: { "apikey": sb._key, "Authorization": `Bearer ${sb._token}`, "Content-Type": file.type },
    body: file,
  });
  if (!r.ok) return null;
  return `${sb._url}/storage/v1/object/public/project-images/${path}`;
}

// ─── Evento global para sincronização ───────────────────────────────────────

function notifyDataChanged(data) {
  window.dispatchEvent(new CustomEvent("portfolio-data-changed", { detail: data }));
}

async function saveData(data) {
  lsSave(data);
  notifyDataChanged(data);
  const ok = await sbSave(data);
  if (ok) console.log("✅ Salvo no Supabase");
  else console.log("💾 Salvo localmente (Supabase indisponível ou não autenticado)");
}

async function resetData() {
  localStorage.removeItem(LS_KEY);
  notifyDataChanged(DEFAULT_DATA);
}

// ─── Hook principal ──────────────────────────────────────────────────────────

function usePortfolioData() {
  const [data, setDataState] = React.useState(() => lsLoad() || DEFAULT_DATA);
  const [loading, setLoading] = React.useState(true);

  // Carrega do Supabase na montagem
  React.useEffect(() => {
    sbLoad().then(sbData => {
      if (sbData) {
        setDataState(sbData);
        lsSave(sbData);
      }
      setLoading(false);
    });
  }, []);

  // Escuta mudanças locais
  React.useEffect(() => {
    const handler = (e) => setDataState(e.detail);
    window.addEventListener("portfolio-data-changed", handler);
    return () => window.removeEventListener("portfolio-data-changed", handler);
  }, []);

  const setData = async (newData) => {
    setDataState(newData);
    await saveData(newData);
  };

  return [data, setData, loading];
}

Object.assign(window, {
  DEFAULT_DATA, lsLoad, lsSave, sbLoad, sbSave,
  saveData, resetData, usePortfolioData, uploadImageToSupabase,
});

  </script>

  <script type="text/babel">

  const [previewing, setPreviewing] = React.useState(false);

  React.useEffect(() => { setDraft(data); }, [JSON.stringify(data)]);

  const save = async () => {
    setSaving(true);
    await setData(draft);
    setSaving(false);
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  // Preview: temporarily apply draft data to live view
  const togglePreview = () => {
    if (!previewing) {
      window.dispatchEvent(new CustomEvent("portfolio-data-changed", { detail: draft }));
      setPreviewing(true);
    } else {
      window.dispatchEvent(new CustomEvent("portfolio-data-changed", { detail: data }));

    position: "fixed", inset: 0, zIndex: 10000,

  };
  const cardStyle = {

        <div style={{ display: "flex", gap: 8, justifyContent: "flex-end" }}>
          <button onClick={onCancel} style={{ padding: "8px 16px", fontSize: 12, fontFamily: "inherit", background: "transparent", color: "#888", border: "1px solid #333", cursor: "pointer", borderRadius: 2 }}>cancelar</button>

  <script type="text/babel">
// V3 — Cena 3D rica: terrain + planeta orbital + estrelas em camadas + ondas
// Synthwave / dark roxo · cursor cria ripples, click envia pulse

function Hero3DTerrain({ accentColor, secondColor = "#ff00aa" }) {
  const mountRef = React.useRef(null);
  React.useEffect(() => {
    const mount = mountRef.current;
    if (!mount || !window.THREE) return;
    const THREE = window.THREE;
    const w = mount.clientWidth, h = mount.clientHeight;
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x0a0514, 6, 32);
    const camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 100);
    camera.position.set(0, 2.5, 6);
    camera.lookAt(0, 0, -5);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    mount.appendChild(renderer.domElement);

    const accentTHREE = new THREE.Color(accentColor);
    const secondTHREE = new THREE.Color(secondColor);

    // ─── Grid terrain ─────────────────────────────────────────────
    const segs = 60;
    const size = 30;
    const geo = new THREE.PlaneGeometry(size, size, segs, segs);
    geo.rotateX(-Math.PI / 2);
    const original = new Float32Array(geo.attributes.position.array);
    const mat = new THREE.LineBasicMaterial({ color: accentTHREE, transparent: true, opacity: 0.55 });
    const wire = new THREE.LineSegments(new THREE.WireframeGeometry(geo), mat);
    wire.position.z = -5;
    scene.add(wire);

    // ─── Estrelas em 3 camadas (parallax) ─────────────────────────
    const starLayers = [];
    [{ count: 800, size: 0.025, depth: -18, color: 0xffffff, opacity: 0.8 },
     { count: 400, size: 0.045, depth: -12, color: secondColor, opacity: 0.6 },
     { count: 200, size: 0.06,  depth: -8,  color: accentColor, opacity: 0.5 }].forEach(layer => {
      const sGeo = new THREE.BufferGeometry();
      const sPos = new Float32Array(layer.count * 3);
      for (let i = 0; i < layer.count; i++) {
        sPos[i*3]     = (Math.random() - 0.5) * 60;
        sPos[i*3 + 1] = (Math.random() - 0.2) * 25;
        sPos[i*3 + 2] = layer.depth + (Math.random() - 0.5) * 4;
      }
      sGeo.setAttribute("position", new THREE.BufferAttribute(sPos, 3));
      const sMat = new THREE.PointsMaterial({ color: layer.color, size: layer.size, transparent: true, opacity: layer.opacity, sizeAttenuation: true });
      const stars = new THREE.Points(sGeo, sMat);
      scene.add(stars);
      starLayers.push({ obj: stars, depth: layer.depth });
    });

    // ─── Partículas que sobem (não caem) — vibe magia ─────────────
    const pCount = 700;
    const pGeo = new THREE.BufferGeometry();
    const pPos = new Float32Array(pCount * 3);
    const pVel = new Float32Array(pCount);
    const pPhase = new Float32Array(pCount);
    for (let i = 0; i < pCount; i++) {
      pPos[i * 3]     = (Math.random() - 0.5) * 22;
      pPos[i * 3 + 1] = Math.random() * 8 - 1;
      pPos[i * 3 + 2] = (Math.random() - 0.5) * 20 - 3;
      pVel[i]   = 0.004 + Math.random() * 0.014;
      pPhase[i] = Math.random() * Math.PI * 2;
    }
    pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({ color: secondTHREE, size: 0.05, transparent: true, opacity: 0.85, sizeAttenuation: true });
    const points = new THREE.Points(pGeo, pMat);
    scene.add(points);

    // ─── Planeta wireframe simples (sem anéis, sem satélites) ─────
    const sphere = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.95, 1),
      new THREE.MeshBasicMaterial({ color: accentTHREE, wireframe: true })
    );
    sphere.position.set(0, 2.2, -4);
    scene.add(sphere);

    // ─── Interação ────────────────────────────────────────────────
    let mx = 0, my = 0, targetMx = 0, targetMy = 0;
    let clickPulse = 0;
    let scrollY = 0;
    const onMove = (e) => {
      targetMx = (e.clientX / window.innerWidth - 0.5);
      targetMy = (e.clientY / window.innerHeight - 0.5);
    };
    const onClick = () => { clickPulse = 1; };
    const onScroll = () => { scrollY = window.scrollY; };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("click", onClick);
    window.addEventListener("scroll", onScroll, { passive: true });

    let raf;
    const start = performance.now();
    const pos = geo.attributes.position;
    const tick = () => {
      const t = (performance.now() - start) * 0.001;
      mx += (targetMx - mx) * 0.06;
      my += (targetMy - my) * 0.06;
      clickPulse *= 0.92;
      const scrollPhase = Math.min(scrollY / 600, 1);

      // Ripple from mouse onto terrain
      for (let i = 0; i < pos.count; i++) {
        const x = original[i * 3];
        const z = original[i * 3 + 2];
        const mouseWorldX = mx * 8;
        const mouseWorldZ = -5 + my * 4;
        const dx = x - mouseWorldX;
        const dz = z - mouseWorldZ;
        const d = Math.sqrt(dx * dx + dz * dz);
        const ripple = Math.sin(d * 1.2 - t * 3) * Math.max(0, 1 - d / 6) * 0.5;
        const wave = Math.sin(x * 0.5 + t) * 0.25 + Math.cos(z * 0.5 + t * 0.8) * 0.25;
        const pulse = clickPulse * Math.max(0, 1 - d / 8) * 0.8;
        pos.setY(i, wave + ripple + pulse);
      }
      pos.needsUpdate = true;
      wire.geometry.dispose();
      wire.geometry = new THREE.WireframeGeometry(geo);

      // Partículas — sobem em espiral
      const pa = pGeo.attributes.position.array;
      for (let i = 0; i < pCount; i++) {
        pa[i * 3 + 1] += pVel[i];
        pa[i * 3]     += Math.sin(t * 0.7 + pPhase[i]) * 0.003 + mx * 0.012;
        pa[i * 3 + 2] += Math.cos(t * 0.5 + pPhase[i]) * 0.003;
        if (pa[i * 3 + 1] > 8) pa[i * 3 + 1] = -1;
      }
      pGeo.attributes.position.needsUpdate = true;

      // Estrelas — parallax sutil com mouse + scroll
      starLayers.forEach((layer, idx) => {
        const factor = (idx + 1) * 0.5;
        layer.obj.rotation.y = t * 0.005 * factor + mx * 0.05 * factor;
        layer.obj.position.x = -mx * factor;
        layer.obj.position.y = -my * factor * 0.4 - scrollPhase * 2;
      });

      // Planeta — segue mouse + rotação contínua + breathe com click
      const planetTargetX = mx * 2.8;
      const planetTargetY = 2.2 - my * 1.4 + Math.sin(t * 0.6) * 0.18;
      sphere.position.x += (planetTargetX - sphere.position.x) * 0.06;
      sphere.position.y += (planetTargetY - sphere.position.y) * 0.06;
      sphere.position.z = -4 - scrollPhase * 3;
      sphere.rotation.y = t * 0.4 + mx * 1.5;
      sphere.rotation.x = t * 0.25 - my * 1.2;
      const breathe = 1 + Math.sin(t * 1.5) * 0.04 + clickPulse * 0.5;
      sphere.scale.setScalar(breathe);

      // Câmera — segue mouse + scroll
      camera.position.x += (mx * 2.5 - camera.position.x) * 0.04;
      camera.position.y += (2.5 - my * 1.5 + scrollPhase * 0.8 - camera.position.y) * 0.04;
      camera.position.z = 6 - scrollPhase * 1.5;
      camera.lookAt(0, 1, -5);

      renderer.render(scene, camera);
      raf = requestAnimationFrame(tick);
    };
    tick();

    const onResize = () => {
      const nw = mount.clientWidth, nh = mount.clientHeight;
      renderer.setSize(nw, nh);
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("click", onClick);
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onResize);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, [accentColor, secondColor]);
  return <div ref={mountRef} style={{ position: "absolute", inset: 0 }} />;
}

// ─── Cena 3D secundária — DNA helix rotativo (background da seção skills) ──
function DNAHelix3D({ accentColor, secondColor }) {
  const mountRef = React.useRef(null);
  React.useEffect(() => {
    const mount = mountRef.current;
    if (!mount || !window.THREE) return;
    const THREE = window.THREE;
    const w = mount.clientWidth, h = mount.clientHeight;
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
    camera.position.set(0, 0, 9);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(w, h);
    mount.appendChild(renderer.domElement);

    const accentTHREE = new THREE.Color(accentColor);
    const secondTHREE = new THREE.Color(secondColor);

    const helixGroup = new THREE.Group();
    scene.add(helixGroup);

    const turns = 4;
    const pointsPerTurn = 14;
    const totalPoints = turns * pointsPerTurn;
    const radius = 1.2;
    const height = 8;

    const nodes1 = [], nodes2 = [];
    for (let i = 0; i < totalPoints; i++) {
      const t = i / totalPoints;
      const angle = t * Math.PI * 2 * turns;
      const y = (t - 0.5) * height;
      // Strand 1
      const n1 = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.12, 0),
        new THREE.MeshBasicMaterial({ color: accentTHREE })
      );
      n1.position.set(Math.cos(angle) * radius, y, Math.sin(angle) * radius);
      helixGroup.add(n1);
      nodes1.push({ obj: n1, angle, y });
      // Strand 2
      const n2 = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.12, 0),
        new THREE.MeshBasicMaterial({ color: secondTHREE })
      );
      n2.position.set(Math.cos(angle + Math.PI) * radius, y, Math.sin(angle + Math.PI) * radius);
      helixGroup.add(n2);
      nodes2.push({ obj: n2, angle: angle + Math.PI, y });
      // Connecting line every 2nd
      if (i % 2 === 0) {
        const lineGeo = new THREE.BufferGeometry().setFromPoints([n1.position.clone(), n2.position.clone()]);
        const line = new THREE.Line(lineGeo, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.2 }));
        helixGroup.add(line);
      }
    }

    let raf, mx = 0, targetMx = 0;
    const onMove = (e) => { targetMx = (e.clientX / window.innerWidth - 0.5); };
    window.addEventListener("mousemove", onMove);

    const start = performance.now();
    const tick = () => {
      const t = (performance.now() - start) * 0.001;
      mx += (targetMx - mx) * 0.05;
      helixGroup.rotation.y = t * 0.4 + mx * 0.6;
      helixGroup.rotation.z = Math.sin(t * 0.3) * 0.1;
      // Pulse cada nó
      nodes1.forEach((n, i) => {
        const s = 1 + Math.sin(t * 2 + i * 0.3) * 0.3;
        n.obj.scale.setScalar(s);
      });
      nodes2.forEach((n, i) => {
        const s = 1 + Math.sin(t * 2 + i * 0.3 + Math.PI) * 0.3;
        n.obj.scale.setScalar(s);
      });
      renderer.render(scene, camera);
      raf = requestAnimationFrame(tick);
    };
    tick();

    const onResize = () => {
      const nw = mount.clientWidth, nh = mount.clientHeight;
      renderer.setSize(nw, nh);
      camera.aspect = nw / nh;
      camera.updateProjectionMatrix();
    };
    window.addEventListener("resize", onResize);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("resize", onResize);
      renderer.dispose();
      if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  }, [accentColor, secondColor]);
  return <div ref={mountRef} style={{ position: "absolute", inset: 0, pointerEvents: "none", opacity: 0.55 }} />;
}

// Custom cursor that reacts to hoverable elements
function CustomCursor({ accentColor, secondColor }) {
  const dotRef = React.useRef(null);
  const ringRef = React.useRef(null);
  const [touch, setTouch] = React.useState(false);
  React.useEffect(() => {
    // Desabilita cursor custom em dispositivos touch / mobile
    const isTouch = ("ontouchstart" in window) || navigator.maxTouchPoints > 0 || window.matchMedia("(hover: none)").matches;
    if (isTouch) { setTouch(true); return; }
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let rx = mx, ry = my;
    let hovering = false;
    const onMove = (e) => { mx = e.clientX; my = e.clientY; };
    const onOver = (e) => {
      const hov = !!(e.target.closest && e.target.closest("a, button, [data-hover]"));
      hovering = hov;
      if (ringRef.current) {
        ringRef.current.style.width = hov ? "60px" : "32px";
        ringRef.current.style.height = hov ? "60px" : "32px";
        ringRef.current.style.borderColor = hov ? secondColor : accentColor;
      }
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseover", onOver);
    let raf;
    const tick = () => {
      rx += (mx - rx) * 0.18;
      ry += (my - ry) * 0.18;
      if (dotRef.current) dotRef.current.style.transform = `translate(${mx - 3}px, ${my - 3}px)`;
      if (ringRef.current) ringRef.current.style.transform = `translate(${rx - (hovering ? 30 : 16)}px, ${ry - (hovering ? 30 : 16)}px)`;
      raf = requestAnimationFrame(tick);
    };
    tick();
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseover", onOver);
    };
  }, [accentColor, secondColor]);
  if (touch) return null;
  return (
    <>
      <div ref={ringRef} style={{ position: "fixed", top: 0, left: 0, width: 32, height: 32, border: `1.5px solid ${accentColor}`, borderRadius: "50%", pointerEvents: "none", zIndex: 9998, transition: "width 0.25s, height 0.25s, border-color 0.2s", mixBlendMode: "difference" }} />
      <div ref={dotRef} style={{ position: "fixed", top: 0, left: 0, width: 6, height: 6, background: accentColor, borderRadius: "50%", pointerEvents: "none", zIndex: 9999 }} />
    </>
  );
}

// ─── Scroll Reveal ───────────────────────────────────────────────────────────
function useScrollReveal(options = {}) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.12, ...options });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Reveal({ children, delay = 0, style }) {
  const [ref, visible] = useScrollReveal();
  return (
    <div ref={ref} style={{ transition: `opacity 0.7s ${delay}s, transform 0.7s ${delay}s`, opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(32px)", ...style }}>
      {children}
    </div>
  );
}

function TiltCard({ children, style, maxTilt = 8, ...rest }) {
  const ref = React.useRef(null);
  const [tilt, setTilt] = React.useState({ rx: 0, ry: 0, glowX: 50, glowY: 50 });
  const [touch, setTouch] = React.useState(false);
  React.useEffect(() => {
    setTouch(("ontouchstart" in window) || navigator.maxTouchPoints > 0 || window.matchMedia("(hover: none)").matches);
  }, []);
  const onMove = (e) => {
    if (touch) return;
    const r = ref.current.getBoundingClientRect();
    const x = (e.clientX - r.left) / r.width;
    const y = (e.clientY - r.top) / r.height;
    setTilt({ ry: (x - 0.5) * maxTilt * 2, rx: -(y - 0.5) * maxTilt * 2, glowX: x * 100, glowY: y * 100 });
  };
  const onLeave = () => setTilt({ rx: 0, ry: 0, glowX: 50, glowY: 50 });
  return (
    <div ref={ref} onMouseMove={onMove} onMouseLeave={onLeave} {...rest}
      style={{ ...style, transform: touch ? "none" : `perspective(900px) rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg)`, transformStyle: "preserve-3d", transition: tilt.rx === 0 ? "transform 0.5s" : "transform 0.1s", "--glow-x": `${tilt.glowX}%`, "--glow-y": `${tilt.glowY}%` }}>
      {children}
    </div>
  );
}

// Magnetic button — attracts toward cursor (desabilita em touch)
function MagneticButton({ children, style, as = "a", strength = 0.3, ...rest }) {
  const ref = React.useRef(null);
  const [off, setOff] = React.useState({ x: 0, y: 0 });
  const [touch, setTouch] = React.useState(false);
  React.useEffect(() => {
    setTouch(("ontouchstart" in window) || navigator.maxTouchPoints > 0 || window.matchMedia("(hover: none)").matches);
  }, []);
  const onMove = (e) => {
    if (touch) return;
    const r = ref.current.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    setOff({ x: (e.clientX - cx) * strength, y: (e.clientY - cy) * strength });
  };
  const onLeave = () => setOff({ x: 0, y: 0 });
  const Comp = as;
  return (
    <Comp ref={ref} onMouseMove={onMove} onMouseLeave={onLeave} {...rest}
      style={{ ...style, transform: touch ? "none" : `translate(${off.x}px, ${off.y}px)`, transition: off.x === 0 ? "transform 0.5s cubic-bezier(.2,1,.2,1)" : "transform 0.1s", display: "inline-block" }}>
      {children}
    </Comp>
  );
}

                  <div style={{ color: "#ccc", marginTop: 2, wordBreak: "break-all" }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        </Reveal>
      </section>

      <section id="projetos" style={v3Styles.section}>
        <Reveal>
        <div style={v3Styles.eyebrow}>/// 02 PROJECTS [{data.projects.length}]</div>
        <h2 style={v3Styles.h2}>{data.ui?.projectsTitle || "Meus projetos."}</h2>
        </Reveal>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 20 }}>
          {data.projects.map((p, i) => (
            <Reveal key={p.id} delay={i * 0.08}>
            <TiltCard data-hover onClick={() => setSelectedProject(p)} style={{ border: `1px solid ${accentColor}40`, padding: 0, background: "#0f0820", position: "relative", overflow: "hidden", cursor: "pointer" }}>
              <div style={{ position: "absolute", inset: 0, background: `radial-gradient(circle at var(--glow-x) var(--glow-y), ${accentColor}25, transparent 60%)`, pointerEvents: "none", zIndex: 1 }} />
              <div style={{ height: 180, background: p.image ? `url(${p.image}) center/cover` : `linear-gradient(135deg, ${accentColor}20, ${secondColor}10)`, position: "relative", display: "flex", alignItems: "center", justifyContent: "center", borderBottom: `1px solid ${accentColor}30` }}>
                {!p.image && <div style={{ fontSize: 40, fontWeight: 900, color: `${accentColor}60`, fontFamily: "'Geist', sans-serif" }}>0{i + 1}</div>}
              </div>
              <div style={{ padding: 20, position: "relative", zIndex: 2 }}>
                <div style={{ fontSize: 22, fontWeight: 700, fontFamily: "'Geist', sans-serif", marginBottom: 8 }}>{p.title}</div>
                <p style={{ fontSize: 13, color: "#aaa", margin: "0 0 14px 0", lineHeight: 1.6 }}>{p.description}</p>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
                  {p.tags.map(t => <span key={t} style={{ fontSize: 10, color: secondColor, background: `${secondColor}15`, padding: "3px 8px", letterSpacing: 1 }}>#{t}</span>)}
                </div>
                <div style={{ fontSize: 10, color: accentColor, letterSpacing: 2 }}>CLIQUE PARA VER DETALHES →</div>
              </div>
            </TiltCard>
            </Reveal>
          ))}
        </div>
      </section>

      <section id="skills" style={{ ...v3Styles.section, position: "relative", overflow: "hidden" }}>
        <DNAHelix3D accentColor={accentColor} secondColor={secondColor} />
        <div style={{ position: "relative", zIndex: 2 }}>
        <Reveal>
        <div style={v3Styles.eyebrow}>/// 03 STACK</div>
        <h2 style={v3Styles.h2}>{data.ui?.skillsTitle || "Stack em estudo."}</h2>
        {(() => {
          // Mapa nome → slug devicon
          const ICONS = {
            "java": "java", "spring boot": "spring", "spring": "spring",
            "mysql": "mysql", "postgresql": "postgresql", "postgres": "postgresql",
            "html / css": "html5", "html": "html5", "css": "css3",
            "javascript": "javascript", "typescript": "typescript",
            "git & github": "git", "git": "git", "github": "github",
            "react": "react", "node.js": "nodejs", "node": "nodejs",
            "docker": "docker", "linux": "linux", "python": "python",
          };
          const iconSlug = (n) => ICONS[n.toLowerCase()] || null;
          const grouped = data.skills.reduce((acc, s) => { (acc[s.category] = acc[s.category] || []).push(s); return acc; }, {});
          const cats = Object.keys(grouped);
          return (
            <div style={{ display: "grid", gridTemplateColumns: `repeat(auto-fit, minmax(260px, 1fr))`, gap: 20 }}>
              {cats.map(cat => (
                <div key={cat} style={{ padding: 22, border: `1px solid ${accentColor}30`, background: `linear-gradient(135deg, ${accentColor}08, transparent)` }}>
                  <div style={{ color: secondColor, fontSize: 10, letterSpacing: 3, marginBottom: 14 }}>// {cat.toUpperCase()}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                    {grouped[cat].map((s, i) => {
                      const slug = iconSlug(s.name);
                      return (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 12px", background: "#0f0820", border: `1px solid ${accentColor}40`, color: "#fff", fontFamily: "'Geist', sans-serif", fontSize: 13 }}>
                          {slug && <img src={`https://cdn.jsdelivr.net/gh/devicons/devicon/icons/${slug}/${slug}-original.svg`} alt={s.name} style={{ width: 18, height: 18, objectFit: "contain" }} onError={e => { e.currentTarget.style.display = "none"; }} />}
                          <span>{s.name}</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          );
        })()}
        </Reveal>
        </div>
      </section>

      <section style={v3Styles.section}>
        <Reveal>
        <div style={v3Styles.eyebrow}>/// 04 TIMELINE</div>
        <h2 style={v3Styles.h2}>{data.ui?.experienceTitle || "Trajetória."}</h2>
        </Reveal>
        <div style={{ display: "grid", gap: 16 }}>
          {data.experience.map((x, i) => (
            <div key={i} style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "180px 1fr", gap: mobile ? 8 : 30, padding: mobile ? "18px 14px" : "24px 20px", background: i % 2 ? "transparent" : "#0f0820", borderLeft: `3px solid ${accentColor}` }}>
              <div>
                <div style={{ color: secondColor, fontSize: 11, letterSpacing: 2 }}>{x.period}</div>
                <div style={{ color: "#888", fontSize: 11, marginTop: 4 }}>{x.company}</div>
              </div>
              <div>
                <div style={{ fontSize: mobile ? 18 : 22, fontWeight: 700, fontFamily: "'Geist', sans-serif", marginBottom: 6 }}>{x.role}</div>
                <p style={{ color: "#bbb", fontSize: 14, margin: 0, lineHeight: 1.6 }}>{x.description}</p>
                {x.bullets && x.bullets.length > 0 && (
                  <ul style={{ marginTop: 12, paddingLeft: 0, listStyle: "none", display: "grid", gap: 6 }}>
                    {x.bullets.map((b, j) => (
                      <li key={j} style={{ color: "#ccc", fontSize: 13, lineHeight: 1.55, fontFamily: "'Geist', sans-serif", paddingLeft: 18, position: "relative" }}>
                        <span style={{ position: "absolute", left: 0, top: 8, width: 8, height: 1, background: accentColor }} />
                        {b}
                      </li>
                    ))}
                  </ul>
                )}
              </div>
            </div>
          ))}
        </div>
      </section>

      {data.testimonials && data.testimonials.length > 0 && (
        <section style={v3Styles.section}>
          <Reveal>
          <div style={v3Styles.eyebrow}>/// 05 REVIEWS</div>
          <h2 style={v3Styles.h2}>{data.ui?.testimonialsTitle || "Recomendações."}</h2>
          </Reveal>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(320px, 1fr))", gap: 20 }}>
            {data.testimonials.map((t, i) => (
              <div key={i} style={{ padding: 28, border: `1px solid ${accentColor}30`, background: `linear-gradient(135deg, ${accentColor}08, ${secondColor}05)` }}>
                <div style={{ color: accentColor, fontSize: 10, letterSpacing: 2, marginBottom: 14 }}>★★★★★</div>
                <p style={{ fontSize: 15, color: "#ddd", lineHeight: 1.7, fontFamily: "'Geist', sans-serif", margin: "0 0 20px" }}>{t.quote}</p>
                <div style={{ borderTop: `1px solid ${accentColor}30`, paddingTop: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 700 }}>{t.author}</div>
                  <div style={{ fontSize: 11, color: "#888" }}>{t.role}</div>
                </div>
              </div>
            ))}
          </div>
        </section>
      )}

      <section id="contato" style={{ ...v3Styles.section, paddingTop: mobile ? 80 : 100, paddingBottom: mobile ? 100 : 140 }}>
        <Reveal>
        <div style={v3Styles.eyebrow}>/// {data.testimonials && data.testimonials.length > 0 ? "06" : "05"} CONNECT</div>
        <h2 style={{ ...v3Styles.h2, fontSize: mobile ? 52 : 110, background: `linear-gradient(90deg, ${accentColor}, ${secondColor})`, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent", backgroundClip: "text" }}>{(data.ui?.contactTitle || "Vamos\nconversar.").split("\n").map((line, i, arr) => <React.Fragment key={i}>{line}{i < arr.length - 1 && <br />}</React.Fragment>)}</h2>
        {data.ui?.contactSubtitle && <div style={{ color: "#aaa", fontSize: mobile ? 14 : 16, fontFamily: "'Geist', sans-serif", marginBottom: 40 }}>{data.ui.contactSubtitle}</div>}
        </Reveal>

        <Reveal delay={0.15}>
        {data.formspreeId ? (
          contactStatus === "sent" ? (
            <div style={{ textAlign: "center", padding: 40, border: `1px solid ${accentColor}40` }}>
              <div style={{ fontSize: 40, marginBottom: 12 }}>✓</div>
              <div style={{ color: accentColor, fontSize: 14, letterSpacing: 2 }}>MENSAGEM ENVIADA!</div>
              <div style={{ color: "#888", fontSize: 13, marginTop: 8 }}>Obrigado pelo contato. Responderei em breve.</div>
            </div>
          ) : (
            <form onSubmit={submitContact} style={{ maxWidth: 560 }}>
              <div style={{ display: "grid", gridTemplateColumns: mobile ? "1fr" : "1fr 1fr", gap: 12, marginBottom: 0 }}>
                <div>
                  <div style={{ fontSize: 10, color: secondColor, letterSpacing: 2, marginBottom: 6 }}>NOME</div>
                  <input required style={inputSt} value={contactForm.name} onChange={e => setContactForm(f => ({...f, name: e.target.value}))} placeholder="Seu nome" />
                </div>
                <div>
                  <div style={{ fontSize: 10, color: secondColor, letterSpacing: 2, marginBottom: 6 }}>EMAIL</div>
                  <input required type="email" style={inputSt} value={contactForm.email} onChange={e => setContactForm(f => ({...f, email: e.target.value}))} placeholder="seu@email.com" />
                </div>
              </div>
              <div style={{ fontSize: 10, color: secondColor, letterSpacing: 2, marginBottom: 6 }}>MENSAGEM</div>
              <textarea required style={{ ...inputSt, minHeight: 120, resize: "vertical" }} value={contactForm.message} onChange={e => setContactForm(f => ({...f, message: e.target.value}))} placeholder="Olá, Marcus!" />
              {contactStatus === "error" && <div style={{ color: "#ef4444", fontSize: 11, marginBottom: 12 }}>Erro ao enviar. Tente novamente.</div>}
              <button type="submit" disabled={contactStatus === "sending"} style={{ padding: "14px 32px", background: contactStatus === "sending" ? "#333" : accentColor, color: "#000", border: "none", cursor: "pointer", fontFamily: "'JetBrains Mono',monospace", fontSize: 12, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase" }}>{contactStatus === "sending" ? "enviando..." : "ENVIAR MENSAGEM ▶"}</button>
            </form>
          )
        ) : (
          <div style={{ textAlign: "center" }}>
            <a href={`mailto:${data.email}`} style={{ display: "inline-block", fontSize: mobile ? 16 : 24, color: "#fff", textDecoration: "none", padding: mobile ? "14px 24px" : "18px 40px", border: `2px solid ${accentColor}`, fontFamily: "'JetBrains Mono', monospace", wordBreak: "break-all" }}>&gt; {data.email}</a>
          </div>
        )}
        </Reveal>

        <div style={{ marginTop: 60, display: "flex", gap: 24, justifyContent: data.formspreeId ? "flex-start" : "center", fontSize: 12, flexWrap: "wrap" }}>
          <a href={`https://${data.github}`} style={{ color: secondColor, textDecoration: "none" }}>[github]</a>
          <a href={`https://${data.linkedin}`} style={{ color: secondColor, textDecoration: "none" }}>[linkedin]</a>
          {data.cvUrl && <a href={data.cvUrl} target="_blank" rel="noopener" style={{ color: "#aaa", textDecoration: "none" }}>[baixar cv]</a>}
        </div>
      </section>

      <footer style={{ padding: mobile ? "20px" : "24px 48px", borderTop: `1px solid ${accentColor}30`, display: "flex", justifyContent: "space-between", fontFamily: "'JetBrains Mono',monospace", fontSize: 11, color: "#555", flexWrap: "wrap", gap: 8 }}>
        <span>© {new Date().getFullYear()} · {data.name}</span>
        <span>{data.ui?.footerTag || "build.v3.synthgrid"}</span>
      </footer>
      <style>{`
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      `}</style>
    </div>
  );
}

Object.assign(window, { PortfolioV3, Hero3DTerrain, DNAHelix3D, CustomCursor, TiltCard, MagneticButton, HiddenAdminTrigger, DiscreetAdminLink });

  </script>

  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<PortfolioV3 accentColor="#ff00aa" bgColor="#0a0514" />);
  </script>
</body>
</html>
